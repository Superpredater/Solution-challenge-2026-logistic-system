# Combined deployments for remaining microservices
# Each follows the same pattern: Deployment + Service + HPA

---
# ─── Routing Engine ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-engine
  namespace: supply-chain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: routing-engine
  template:
    metadata:
      labels:
        app: routing-engine
    spec:
      containers:
        - name: routing-engine
          image: supply-chain/routing-engine:latest
          envFrom:
            - configMapRef:
                name: supply-chain-config
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: routing-engine
  namespace: supply-chain
spec:
  selector:
    app: routing-engine
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: routing-engine-hpa
  namespace: supply-chain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: routing-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

